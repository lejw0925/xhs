version: '3.8'

services:
  xhs-flutter-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHON_PATH=python3
      - XHS_MODULE_PATH=/app
    volumes:
      - /tmp:/tmp  # For temporary Python script files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Python XHS API service (if using separate API server)
  xhs-python-api:
    build:
      context: ../..
      dockerfile: xhs-api/Dockerfile
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
    restart: unless-stopped
    profiles:
      - with-python-api

networks:
  default:
    name: xhs-network